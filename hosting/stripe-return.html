<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to TravelApp</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #eef8de;
        color: #28460f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(92vw, 440px);
        padding: 24px;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(40, 70, 15, 0.12);
      }
      a {
        color: #4f8f13;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Връщаме те обратно в TravelApp</h1>
      <p>Ако приложението не се отвори автоматично, натисни линка отдолу.</p>
      <p><a id="return-link" href="/">Обратно към приложението</a></p>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const target = params.get("target") || "";
        const checkout = params.get("checkout") === "cancel" ? "cancel" : "success";
        const kind = params.get("kind") === "expense-repayment" ? "expense-repayment" : "booking";
        const sessionId = params.get("session_id") || "";

        if (!target) {
          return;
        }

        const redirectUrl = new URL(target);
        redirectUrl.searchParams.set("checkout", checkout);
        redirectUrl.searchParams.set("kind", kind);

        if (sessionId) {
          redirectUrl.searchParams.set("session_id", sessionId);
        }

        const redirectTarget = redirectUrl.toString();
        const returnLink = document.getElementById("return-link");

        if (returnLink) {
          returnLink.setAttribute("href", redirectTarget);
        }

        window.location.replace(redirectTarget);
      })();
    </script>
  </body>
</html>
